<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProBilling v5.2 - Premium Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #2563eb; --accent: #3b82f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; height: 100vh; overflow: hidden; margin: 0; }
        
        /* PREMIUM SIDEBAR GLASSMORPHISM */
        .glass-sidebar { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px); 
            border-right: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.02);
        }

        .sidebar-input { 
            background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; 
            padding: 10px 14px; font-size: 14px; width: 100%; outline: none; 
            transition: all 0.2s ease; 
        }
        .sidebar-input:focus { border-color: var(--primary); ring: 3px rgba(37, 99, 235, 0.1); }
        
        .app-container { display: flex; height: 100vh; width: 100vw; }
        .preview-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 40px; background: #cbd5e1; position: relative; }

        /* BILL FORMAT (Classic Clean) */
        #invoice-preview {
            width: 210mm; min-height: 297mm; padding: 12mm; background: white !important;
            color: #000 !important; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; box-sizing: border-box; transform-origin: top center;
        }
        .bill-border { border: 2px solid #000 !important; padding: 15px; flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        
        .inv-table { width: 100%; border-collapse: collapse; margin-top: 15px; table-layout: fixed; }
        .inv-table th { border: 1.5px solid #000 !important; padding: 10px 5px; font-size: 12px; font-weight: 800; background: #f8fafc !important; }
        .inv-table td { border: 1.5px solid #000 !important; padding: 8px; font-size: 14px; height: 35px; word-wrap: break-word; }

        .summary-section { margin-top: auto; padding-top: 20px; border-top: 2.5px solid #000 !important; }
        .total-display { font-size: 28px; font-weight: 900; text-align: right; flex-grow: 1; word-break: break-all; margin-left: 10px; }

        /* SEARCH DROPDOWN JUGAD */
        #search-results-box {
            position: absolute; top: 100%; left: 0; right: 0; background: white; 
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            z-index: 100; display: none; margin-top: 6px; border: 1px solid #e2e8f0;
        }
        #search-results-box.active { display: block; }

        /* MOBILE FIX */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; overflow-y: auto; }
            aside { width: 100% !important; height: auto !important; position: static; }
            .preview-area { padding: 20px 0; background: #f1f5f9; min-height: 500px; }
            #invoice-preview { transform: scale(0.42); margin: -250px auto; }
        }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        #toast { position: fixed; bottom: 2rem; right: 2rem; transform: translateX(200%); transition: 0.4s; z-index: 10000; }
        #toast.show { transform: translateX(0); }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white !important; overflow: visible !important; }
            .no-print, aside, button { display: none !important; }
            .preview-area { padding: 0 !important; display: block !important; background: white !important; }
            #invoice-preview { box-shadow: none !important; margin: 0 !important; transform: scale(1) !important; width: 210mm !important; position: static !important; }
        }
    </style>
</head>

<body>
    <div id="toast" class="bg-slate-900 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 no-print">
        <span id="toast-msg" class="font-bold text-sm">Success!</span>
    </div>

    <div id="settings-modal" class="modal no-print" onclick="toggleSettings()">
        <div class="bg-white p-8 rounded-[32px] w-[90%] max-w-[500px] shadow-2xl" onclick="event.stopPropagation()">
            <h2 id="modal-title" class="text-2xl font-800 mb-4 border-b pb-2">Shop Management</h2>
            <input type="hidden" id="edit-shop-id">
            <div class="space-y-3 mb-6">
                <input id="new-shop-name" placeholder="Shop Name" class="sidebar-input font-bold uppercase">
                <input id="new-shop-gstin" placeholder="GSTIN" class="sidebar-input uppercase">
                <input id="new-shop-phone" placeholder="Phone" class="sidebar-input">
                <input id="new-shop-address" placeholder="Address" class="sidebar-input">
                <button id="save-shop-btn" onclick="saveShopAction()" class="w-full bg-blue-600 text-white py-3.5 rounded-2xl font-bold shadow-lg shadow-blue-200">Save Shop Profile</button>
            </div>
            <div id="shop-list" class="max-h-32 overflow-y-auto space-y-2"></div>
            <button onclick="toggleSettings()" class="w-full mt-4 text-gray-400 font-bold text-xs uppercase">Close</button>
        </div>
    </div>

    <div class="app-container">
        <aside class="w-[430px] glass-sidebar flex flex-col h-full no-print z-10 shadow-2xl">
            <div class="p-6 bg-white border-b border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-800 tracking-tighter text-slate-900">ProBilling<span class="text-blue-600">.</span></h1>
                    <div class="flex gap-2">
                        <button onclick="toggleSettings()" class="bg-slate-50 p-2 rounded-xl border border-slate-200 hover:bg-white transition">⚙️</button>
                        <button onclick="createNewBill()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg shadow-blue-100">NEW BILL</button>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-slate-50 p-2 rounded-xl border border-slate-100 text-center">
                        <p class="text-[8px] text-gray-400 font-bold uppercase">Today Sale</p>
                        <p id="dash-today" class="text-xs font-800">₹0</p>
                    </div>
                    <div class="bg-slate-50 p-2 rounded-xl border border-slate-100 text-center">
                        <p class="text-[8px] text-gray-400 font-bold uppercase">Month Sale</p>
                        <p id="dash-month" class="text-xs font-800">₹0</p>
                    </div>
                    <div class="bg-slate-50 p-2 rounded-xl border border-slate-100 text-center">
                        <p class="text-[8px] text-gray-400 font-bold uppercase">Bills</p>
                        <p id="dash-count" class="text-xs font-800">0</p>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-5 space-y-6">
                <div class="search-area relative">
                    <label class="text-[10px] font-bold text-blue-600 ml-1 uppercase tracking-widest">Search & Load Bill</label>
                    <input id="search-input" oninput="handleSearch()" placeholder="Type Customer Name, Mob, or Inv#..." class="sidebar-input border-blue-400/50 ring-4 ring-blue-50">
                    <div id="search-results-box" class="p-2 space-y-1"></div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 ml-1 uppercase">Active Shop</label>
                        <select id="active-shop-select" onchange="switchShop()" class="sidebar-input font-bold text-blue-600 bg-blue-50 border-blue-100"></select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 ml-1 uppercase">Invoice Date</label>
                        <input type="date" id="inv-date-input" onchange="updatePreview()" class="sidebar-input text-xs">
                    </div>
                </div>

                <div class="space-y-3">
                    <input id="cust-name-input" oninput="updatePreview()" placeholder="Customer Name" class="sidebar-input font-semibold" />
                    <input id="cust-mobile-input" placeholder="Mobile Number" class="sidebar-input" />
                </div>

                <div class="bg-slate-900 rounded-[28px] p-6 space-y-4 shadow-2xl">
                    <input id="item-name" placeholder="Item Name / Description" class="w-full bg-slate-800 border-none text-white rounded-xl p-3.5 text-sm outline-none" />
                    <div class="flex gap-2">
                        <input id="item-qty" type="number" placeholder="Qty" class="w-1/4 bg-slate-800 border-none text-white rounded-xl p-3.5 text-sm" />
                        <input id="item-rate" type="number" placeholder="Rate" class="w-1/2 bg-slate-800 border-none text-white rounded-xl p-3.5 text-sm" />
                        <select id="item-gst" class="w-1/4 bg-slate-800 border-none text-white rounded-xl p-3 text-xs">
                            <option value="18" selected>18%</option><option value="12">12%</option><option value="5">5%</option><option value="0">0%</option>
                        </select>
                    </div>
                    <button onclick="addItem()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-bold shadow-lg transition active:scale-95">ADD TO LIST</button>
                </div>

                <div id="history-panel" class="space-y-2"></div>
            </div>

            <div class="p-5 border-t bg-white flex gap-3 sticky bottom-0">
                <button onclick="saveBill()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-emerald-100 transition active:scale-95">SAVE BILL</button>
                <button onclick="window.print()" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg transition active:scale-95">PRINT</button>
            </div>
        </aside>

        <main class="preview-area no-print">
            <button onclick="downloadPDF()" class="bg-purple-600 text-white px-12 py-4 rounded-full font-bold shadow-2xl mb-8 hover:scale-105 transition-all">DOWNLOAD HD PDF</button>

            <div id="invoice-preview">
                <div class="bill-border">
                    <div class="flex justify-between border-b-2 border-black pb-4">
                        <div class="w-2/3">
                            <p id="prev-shop-address" class="text-[13px] italic mb-1 font-medium"></p>
                            <h2 id="prev-shop-name" class="text-3xl font-800 uppercase tracking-tighter"></h2>
                            <div class="flex gap-4 mt-2 text-[12px] font-bold">
                                <span>GSTIN: <span id="prev-shop-gstin" class="font-normal uppercase"></span></span>
                                <span>MOB: <span id="prev-shop-phone" class="font-normal"></span></span>
                            </div>
                        </div>
                        <div class="text-right">
                            <h1 class="text-2xl font-black"># <span id="prev-inv-no"></span></h1>
                            <p class="text-sm font-bold">Date: <span id="prev-inv-date"></span></p>
                        </div>
                    </div>

                    <div class="py-4 border-b border-black">
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">BILLED TO:</p>
                        <h3 id="prev-cust-name" class="text-xl font-black uppercase"></h3>
                        <p id="prev-cust-mob" class="text-xs font-bold"></p>
                    </div>

                    <table class="inv-table">
                        <thead>
                            <tr><th width="8%">S.NO</th><th width="47%">DESCRIPTION</th><th width="10%">QTY</th><th width="12%">RATE</th><th width="8%">GST</th><th width="15%">AMOUNT</th></tr>
                        </thead>
                        <tbody id="prev-table-body"></tbody>
                    </table>

                    <div class="summary-section">
                        <div class="flex justify-between items-start pb-8">
                            <div class="w-1/2">
                                <p class="text-[10px] font-bold text-gray-500 uppercase">AMOUNT IN WORDS:</p>
                                <p id="prev-words" class="text-[13px] font-black italic uppercase leading-tight"></p>
                            </div>
                            <div class="w-[300px] space-y-1">
                                <div class="flex justify-between text-[14px]"><span>Subtotal:</span><span id="prev-subtotal" class="font-bold"></span></div>
                                <div class="flex justify-between text-[14px] border-b border-black pb-1"><span>Total GST:</span><span id="prev-gst" class="font-bold"></span></div>
                                <div class="final-total-row">
                                    <span class="text-xl font-black">TOTAL:</span>
                                    <div class="total-display">₹ <span id="prev-grand"></span></div>
                                </div>
                            </div>
                        </div>
                        <div class="flex justify-between items-end">
                            <div class="text-center w-36 border-t-2 border-black pt-1 text-[10px] font-bold uppercase">Customer Sign</div>
                            <div class="text-center">
                                <p id="footer-shop-name" class="text-[11px] font-black mb-10 uppercase"></p>
                                <div class="w-64 border-t-2 border-black pt-1 text-[10px] font-bold uppercase">Authorised Signatory</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let appData = JSON.parse(localStorage.getItem("gst_pro_v5_2")) || {
            shops: [
                { id: "ak", name: "AK TRADERS", gstin: "23AAAAA1234A1Z1", phone: "9876543210", address: "Market Area, India", nextInv: 1001, bills: [] },
                { id: "mg", name: "MAA GANGA ENTERPRISES", gstin: "23BBBBB5678B1Z2", phone: "9988776655", address: "City Center, India", nextInv: 1001, bills: [] }
            ],
            currentShopId: "ak"
        };
        let currentBillItems = [];

        window.onload = () => { renderShopSelector(); resetDate(); renderHistory(); updateAnalytics(); updatePreview(); };

        function handleSearch() {
            const q = document.getElementById("search-input").value.toLowerCase();
            const box = document.getElementById("search-results-box");
            if(q.length < 1) { box.classList.remove("active"); return; }
            const shop = getActiveShop();
            const filtered = shop.bills.filter(b => b.customer.toLowerCase().includes(q) || (b.mobile && b.mobile.includes(q)) || b.invNo.toString().includes(q));
            if(filtered.length > 0) {
                box.innerHTML = filtered.map(b => `<div onclick="loadOldBill(${b.invNo})" class="p-3 border-b hover:bg-blue-50 cursor-pointer flex justify-between items-center transition-all"><div><b class="text-xs">#${b.invNo} ${b.customer}</b><p class="text-[9px] text-gray-400">${b.date}</p></div><div class="text-xs font-bold text-blue-600">${b.total}</div></div>`).join('');
                box.classList.add("active");
            } else { box.innerHTML = `<div class="p-3 text-center text-xs text-gray-400">No match found</div>`; box.classList.add("active"); }
        }

        document.addEventListener('click', (e) => { if (!document.getElementById('search-input').contains(e.target)) document.getElementById('search-results-box').classList.remove('active'); });

        function switchShop() { appData.currentShopId = document.getElementById("active-shop-select").value; saveData(); renderHistory(); updateAnalytics(); updatePreview(); }
        function getActiveShop() { return appData.shops.find(s => s.id === appData.currentShopId) || appData.shops[0]; }
        function saveData() { localStorage.setItem("gst_pro_v5_2", JSON.stringify(appData)); }
        function resetDate() { document.getElementById("inv-date-input").value = new Date().toISOString().split('T')[0]; }

        function updateAnalytics() {
            const shop = getActiveShop();
            const today = new Date().toISOString().split('T')[0];
            let todayT = 0, monthT = 0;
            shop.bills.forEach(b => {
                const val = parseFloat(b.total.replace(/[₹,]/g, ''));
                if(b.date === today) todayT += val;
                if(b.date.startsWith(today.substring(0,7))) monthT += val;
            });
            document.getElementById("dash-today").innerText = "₹" + todayT.toLocaleString('en-IN');
            document.getElementById("dash-month").innerText = "₹" + monthT.toLocaleString('en-IN');
            document.getElementById("dash-count").innerText = shop.bills.length;
        }

        function updatePreview() {
            const shop = getActiveShop();
            document.getElementById("prev-shop-name").innerText = shop.name;
            document.getElementById("footer-shop-name").innerText = "For " + shop.name;
            document.getElementById("prev-shop-address").innerText = shop.address;
            document.getElementById("prev-shop-gstin").innerText = shop.gstin;
            document.getElementById("prev-shop-phone").innerText = shop.phone;
            document.getElementById("prev-inv-no").innerText = shop.nextInv;
            document.getElementById("prev-cust-name").innerText = document.getElementById("cust-name-input").value || "CASH CUSTOMER";
            document.getElementById("prev-cust-mob").innerText = document.getElementById("cust-mobile-input").value ? "Mob: " + document.getElementById("cust-mobile-input").value : "";
            document.getElementById("prev-inv-date").innerText = document.getElementById("inv-date-input").value.split('-').reverse().join('/');

            const tbody = document.getElementById("prev-table-body");
            tbody.innerHTML = "";
            let sub = 0, gst = 0;
            currentBillItems.forEach((item, idx) => {
                let amt = item.qty * item.rate;
                let g = (amt * item.gst) / 100;
                sub += amt; gst += g;
                tbody.innerHTML += `<tr><td align="center">${idx+1}</td><td class="font-bold">${item.name}</td><td align="center">${item.qty}</td><td align="right">${item.rate.toFixed(2)}</td><td align="center">${item.gst}%</td><td align="right"><b>${(amt + g).toFixed(2)}</b></td></tr>`;
            });
            for(let i=currentBillItems.length; i<12; i++) tbody.innerHTML += `<tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>`;
            const grand = Math.round(sub + gst);
            document.getElementById("prev-subtotal").innerText = "₹ " + sub.toLocaleString('en-IN');
            document.getElementById("prev-gst").innerText = "₹ " + gst.toLocaleString('en-IN');
            document.getElementById("prev-grand").innerText = grand.toLocaleString('en-IN') + ".00";
            document.getElementById("prev-words").innerText = numberToWords(grand);
        }

        function addItem() {
            const n = document.getElementById("item-name").value;
            const q = parseFloat(document.getElementById("item-qty").value);
            const r = parseFloat(document.getElementById("item-rate").value);
            if(!n || isNaN(q) || isNaN(r)) return;
            currentBillItems.push({name:n, qty:q, rate:r, gst: parseFloat(document.getElementById("item-gst").value)});
            document.getElementById("item-name").value = ""; document.getElementById("item-qty").value = ""; document.getElementById("item-rate").value = "";
            updatePreview();
        }

        function saveBill() {
            if(currentBillItems.length === 0) return;
            const shop = getActiveShop();
            shop.bills.unshift({ invNo: shop.nextInv, customer: document.getElementById("prev-cust-name").innerText, mobile: document.getElementById("cust-mobile-input").value, total: document.getElementById("prev-grand").innerText, items: [...currentBillItems], date: document.getElementById("inv-date-input").value });
            shop.nextInv++;
            saveData(); showToast("Invoice Saved!"); renderHistory(); updateAnalytics(); createNewBill();
        }

        function loadOldBill(n) {
            const b = getActiveShop().bills.find(x => x.invNo === n);
            if(b) { currentBillItems = [...b.items]; document.getElementById("cust-name-input").value = b.customer; document.getElementById("cust-mobile-input").value = b.mobile || ""; document.getElementById("inv-date-input").value = b.date; document.getElementById("prev-inv-no").innerText = b.invNo; updatePreview(); document.getElementById("search-results-box").classList.remove("active"); }
        }

        function createNewBill() { currentBillItems = []; document.getElementById("cust-name-input").value = ""; document.getElementById("cust-mobile-input").value = ""; updatePreview(); }
        function renderShopSelector() { document.getElementById("active-shop-select").innerHTML = appData.shops.map(s => `<option value="${s.id}">${s.name}</option>`).join(''); }
        function toggleSettings() { document.getElementById("settings-modal").classList.toggle("active"); renderSettingsShopList(); }
        function renderSettingsShopList() { document.getElementById("shop-list").innerHTML = appData.shops.map(sh => `<div class="p-3 bg-slate-50 border rounded-xl flex justify-between items-center text-xs"><span><b>${sh.name}</b></span><div><button onclick="editShop('${sh.id}')" class="text-blue-600 mr-2 font-bold">Edit</button><button onclick="deleteShop('${sh.id}')" class="text-red-500 font-bold">Del</button></div></div>`).join(''); }
        function deleteShop(id) { if(appData.shops.length <= 1) return; appData.shops = appData.shops.filter(s => s.id !== id); saveData(); renderSettingsShopList(); renderShopSelector(); }

        function saveShopAction() {
            const id = document.getElementById("edit-shop-id").value;
            const name = document.getElementById("new-shop-name").value.toUpperCase();
            if(!name) return;
            if(id) { const s = appData.shops.find(x => x.id === id); s.name = name; s.gstin = document.getElementById("new-shop-gstin").value.toUpperCase(); s.phone = document.getElementById("new-shop-phone").value; s.address = document.getElementById("new-shop-address").value; }
            else { appData.shops.push({ id: 'shop_'+Date.now(), name, gstin: document.getElementById("new-shop-gstin").value.toUpperCase(), phone: document.getElementById("new-shop-phone").value, address: document.getElementById("new-shop-address").value, nextInv: 1001, bills: [] }); }
            saveData(); toggleSettings(); renderShopSelector(); updatePreview();
        }

        function editShop(id) {
            const s = appData.shops.find(x => x.id === id);
            document.getElementById("edit-shop-id").value = s.id;
            document.getElementById("new-shop-name").value = s.name;
            document.getElementById("new-shop-gstin").value = s.gstin;
            document.getElementById("new-shop-phone").value = s.phone;
            document.getElementById("new-shop-address").value = s.address;
            document.getElementById("modal-title").innerText = "Update Shop Profile";
        }

        function renderHistory() {
            const shop = getActiveShop();
            document.getElementById("history-panel").innerHTML = `<div class="p-4 bg-slate-50 border rounded-2xl"><p class="text-[10px] font-black text-blue-600 uppercase mb-3 tracking-widest">Recent Activity</p><div class="space-y-2 max-h-40 overflow-y-auto">${shop.bills.slice(0, 5).map(b => `<div onclick="loadOldBill(${b.invNo})" class="p-3 bg-white border rounded-xl flex justify-between items-center cursor-pointer hover:border-blue-400 transition"><div><b class="text-xs">#${b.invNo} ${b.customer}</b></div><div class="text-xs font-bold text-emerald-600">${b.total}</div></div>`).join('')}</div></div>`;
        }

        async function downloadPDF() {
            const invNo = document.getElementById("prev-inv-no").innerText;
            const cust = (document.getElementById("prev-cust-name").innerText || "CASH").replace(/\s+/g, '_');
            const canvas = await html2canvas(document.getElementById("invoice-preview"), { scale: 3 });
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
            pdf.save(`Inv_${invNo}_${cust}.pdf`);
        }

        function numberToWords(num) {
            const a = ['','One ','Two ','Three ','Four ','Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
            const b = ['', '', 'Twenty','Thirty','Forty','Fifty', 'Sixty','Seventy','Eighty','Ninety'];
            function convert(n) { if (n < 20) return a[n]; return b[Math.floor(n/10)] + " " + a[n%10]; }
            let n = Math.floor(num); if (n === 0) return 'Zero Rupees Only';
            let res = "";
            if (n >= 10000000) { res += convert(Math.floor(n/10000000)) + " Crore "; n %= 10000000; }
            if (n >= 100000) { res += convert(Math.floor(n/100000)) + " Lakh "; n %= 100000; }
            if (n >= 1000) { res += convert(Math.floor(n/1000)) + " Thousand "; n %= 1000; }
            if (n >= 100) { res += a[Math.floor(n/100)] + " Hundred "; n %= 100; }
            if (n > 0) res += convert(n);
            return res.trim() + " Rupees Only";
        }
        function showToast(m) { const t = document.getElementById("toast"); document.getElementById("toast-msg").innerText = m; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2000); }
    </script>
</body>
